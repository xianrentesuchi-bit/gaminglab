<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Viewer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;
}

.sidebar{
    width:250px;
    background:#111;
    color:white;
    overflow-y:auto;
}

.logo{
    padding:20px;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

.game{
    padding:15px 20px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.game:hover{
    background:#222;
}

.viewer{
    flex:1;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}
</style>
</head>
<body>

<div class="sidebar">

    <div class="logo">Games</div>

    <div class="game" onclick="openGame('/src/assets/games/2048/2048.html')">
        2048
    </div>

    <div class="game" onclick="openGame('/src/assets/games/Geometry/GeometryDash.html')">
        Geometry Dash
    </div>

    <div class="game" onclick="openGame('/src/assets/games/block/block.html')">
        Block
    </div>

    <div class="game" onclick="openGame('/src/assets/games/paperio/paperio.html')">
        Paper.io
    </div>

    <div class="game" onclick="openGame('/src/assets/games/snowball/snow.html')">
        Snowball
    </div>

    <div class="game" onclick="openGame('/src/assets/games/snowrider/snowrider.html')">
        Snow Rider
    </div>

    <div class="game" onclick="openGame('/src/assets/games/sticman/sticman.html')">
        Stickman
    </div>

    <div class="game" onclick="openGame('/src/assets/games/tumutumu/tumu.html')">
        TumuTumu
    </div>

</div>

<div class="viewer">
    <iframe
        id="gameFrame"
        src="/src/assets/games/2048/2048.html">
    </iframe>
</div>

<script>
function openGame(path){
    document.getElementById("gameFrame").src = path;
}
</script>

</body>
</html>
